<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fatty Chem Training</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f4f5f7;color:#1a1a1a}
input,select,button,textarea{font-family:inherit}

/* Layout */
#app{display:flex;min-height:100vh}
#sidebar{width:290px;min-width:290px;background:#1a1a1a;color:#fff;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;z-index:100}
#main{margin-left:290px;flex:1;display:flex;flex-direction:column;min-height:100vh}

/* Sidebar */
.sb-brand{padding:24px 22px 16px;border-bottom:1px solid #2a2a2a}
.sb-brand .logo{font-size:20px;font-weight:700;color:#fff}.sb-brand .logo span{color:#e8a020}
.sb-brand .tagline{font-size:11px;color:#666;margin-top:3px;text-transform:uppercase;letter-spacing:.8px}
.sb-user{padding:14px 22px;border-bottom:1px solid #2a2a2a;font-size:12px;color:#888}
.sb-user strong{color:#ccc;display:block;font-size:13px}
.sb-course-title{padding:14px 22px 10px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#555}

.sb-progress-wrap{padding:0 22px 14px;border-bottom:1px solid #2a2a2a}
.sb-progress-label{display:flex;justify-content:space-between;font-size:11px;color:#666;margin-bottom:6px}
.prog-bar{height:5px;background:#333;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:#e8a020;border-radius:3px;transition:width .4s ease}

.sb-modules{padding:12px 0;flex:1}
.sb-mod{padding:12px 22px;cursor:pointer;display:flex;align-items:center;gap:10px;border-left:3px solid transparent;transition:background .15s,border-color .15s}
.sb-mod:hover{background:#252525}
.sb-mod.active{background:#252525;border-left-color:#e8a020}
.sb-mod.done .mod-num{background:#2d6a2d;color:#6fcf6f}
.mod-num{width:26px;height:26px;border-radius:50%;background:#2a2a2a;color:#666;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mod-info{flex:1}
.mod-name{font-size:12px;font-weight:600;color:#ccc;line-height:1.3}
.mod-sub{font-size:10px;color:#555;margin-top:2px}
.mod-check{color:#6fcf6f;font-size:13px}

.sb-footer{padding:16px 22px;border-top:1px solid #2a2a2a;font-size:11px;color:#444}

/* Topbar */
#topbar{background:#fff;border-bottom:1px solid #e5e7eb;height:56px;padding:0 36px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.tb-crumb{font-size:13px;color:#888}.tb-crumb strong{color:#1a1a1a}
.tb-right{display:flex;align-items:center;gap:10px;font-size:12px;color:#888}

/* Content */
#content{padding:36px;max-width:820px}

/* Module header */
.mod-header{margin-bottom:28px}
.mod-num-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#e8a020;margin-bottom:6px}
.mod-title{font-size:26px;font-weight:700;color:#1a1a1a;margin-bottom:6px}
.mod-desc{font-size:14px;color:#777;line-height:1.6}

/* Content sections */
.section{margin-bottom:32px}
.section h2{font-size:17px;font-weight:700;color:#1a1a1a;margin-bottom:10px;padding-bottom:7px;border-bottom:2px solid #e8a020;display:inline-block}
.section h3{font-size:14px;font-weight:700;color:#1a1a1a;margin:18px 0 6px}
.section p{font-size:13.5px;color:#444;line-height:1.75;margin-bottom:10px}
.section ul,.section ol{padding-left:20px;margin-bottom:10px}
.section li{font-size:13.5px;color:#444;line-height:1.75;margin-bottom:3px}

.info-box{background:#fff8e8;border:1px solid #f0d080;border-left:4px solid #e8a020;border-radius:8px;padding:14px 18px;margin:14px 0}
.info-box p{font-size:13px;color:#7a5500;margin:0;line-height:1.6}
.callout{background:#1a1a1a;color:#fff;border-radius:10px;padding:18px 22px;margin:18px 0}
.callout .clabel{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#e8a020;font-weight:700;margin-bottom:6px}
.callout p{font-size:13.5px;color:#ccc;line-height:1.6;margin:0}
.callout p strong{color:#fff}
.script-box{background:#f8f9ff;border:1px solid #d0d8f0;border-left:4px solid #5b7fd4;border-radius:8px;padding:14px 18px;margin:14px 0;font-family:Georgia,serif}
.script-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#5b7fd4;margin-bottom:8px;font-family:'Segoe UI',Arial,sans-serif}
.script-box p{font-size:13.5px;color:#2a2a2a;line-height:1.7;margin-bottom:5px;font-style:italic}
.script-box p:last-child{margin-bottom:0}

/* Tables */
.dtable{width:100%;border-collapse:collapse;font-size:12.5px;margin:14px 0}
.dtable th{background:#1a1a1a;color:#fff;padding:9px 13px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.dtable td{padding:9px 13px;border-bottom:1px solid #e5e7eb;color:#444;vertical-align:top}
.dtable tr:nth-child(even) td{background:#fafafa}
.dtable td strong{color:#1a1a1a}

/* Tier cards */
.tier-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:14px 0}
.tier-card{border-radius:8px;padding:14px}
.tier-card.t1{background:#fff4dc;border:1px solid #f0d080}
.tier-card.t2{background:#e8f4e8;border:1px solid #90c890}
.tier-card.t3{background:#eef2ff;border:1px solid #a0b0e8}
.tlabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.tier-card.t1 .tlabel{color:#b87b00}
.tier-card.t2 .tlabel{color:#2d6a2d}
.tier-card.t3 .tlabel{color:#3d5ab0}
.tier-card h4{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:4px}
.tier-card p{font-size:11.5px;color:#555;line-height:1.5}

/* Steps */
.steps{display:flex;flex-direction:column;gap:0;margin:14px 0}
.step{display:flex;gap:14px;position:relative;padding-bottom:18px}
.step:last-child{padding-bottom:0}
.step:not(:last-child)::before{content:'';position:absolute;left:14px;top:32px;bottom:0;width:2px;background:#e5e7eb}
.step-n{width:28px;height:28px;border-radius:50%;background:#e8a020;color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:1}
.step-b{padding-top:3px;flex:1}
.step-b h4{font-size:13.5px;font-weight:700;color:#1a1a1a;margin-bottom:3px}
.step-b p{font-size:13px;color:#555;line-height:1.6}

/* Objections */
.obj-card{border:1px solid #e5e7eb;border-radius:10px;margin-bottom:12px;overflow:hidden}
.obj-head{padding:13px 16px;background:#fff;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.obj-head h4{font-size:13.5px;font-weight:700;color:#1a1a1a}
.obj-head span{font-size:11px;color:#aaa}
.obj-body{padding:0 16px;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease;background:#fafafa;border-top:1px solid #e5e7eb}
.obj-body.open{max-height:500px;padding:14px 16px}
.obj-why{font-size:12.5px;color:#888;margin-bottom:8px;font-style:italic}
.obj-rlabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#e8a020;margin-bottom:5px}

/* Follow-up sequence */
.seq{display:flex;gap:0;overflow-x:auto;margin:14px 0;padding-bottom:4px}
.seq-step{min-width:145px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:14px;margin-right:10px;flex-shrink:0}
.seq-day{font-size:10px;font-weight:700;text-transform:uppercase;color:#e8a020;margin-bottom:4px}
.seq-method{font-size:12px;font-weight:700;color:#1a1a1a;margin-bottom:4px}
.seq-step p{font-size:11.5px;color:#666;line-height:1.4}

/* Quiz */
#quiz-wrap{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:28px;margin-top:36px}
.quiz-head h2{font-size:18px;font-weight:700;margin-bottom:4px}
.quiz-head p{font-size:12px;color:#888;margin-bottom:18px}
.q-dots{display:flex;gap:5px;margin-bottom:18px}
.q-dot{width:8px;height:8px;border-radius:50%;background:#e5e7eb}
.q-dot.ans{background:#e8a020}.q-dot.ok{background:#4caf50}.q-dot.bad{background:#f44336}
.q-num{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:6px}
.q-text{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:18px;line-height:1.5}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{padding:12px 16px;border:2px solid #e5e7eb;border-radius:9px;cursor:pointer;font-size:13.5px;color:#333;transition:border-color .15s,background .15s;display:flex;align-items:center;gap:10px}
.opt:hover{border-color:#e8a020;background:#fffbf0}
.opt.sel{border-color:#e8a020;background:#fffbf0}
.opt.ok{border-color:#4caf50;background:#f0faf0;color:#1a4a1a}
.opt.bad{border-color:#f44336;background:#fff5f5;color:#4a1a1a}
.opt.show-ok{border-color:#4caf50;background:#f0faf0}
.opt-ltr{width:26px;height:26px;border-radius:50%;background:#f0f0f0;color:#666;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.opt.ok .opt-ltr{background:#4caf50;color:#fff}
.opt.bad .opt-ltr{background:#f44336;color:#fff}
.opt.show-ok .opt-ltr{background:#4caf50;color:#fff}
.explain{margin-top:12px;padding:12px 14px;border-radius:7px;font-size:12.5px;line-height:1.6;display:none}
.explain.ok-exp{background:#f0faf0;border:1px solid #90c890;color:#1a4a1a;display:block}
.explain.bad-exp{background:#fff5f5;border:1px solid #f0a0a0;color:#4a1a1a;display:block}
.quiz-nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px}
.quiz-nav .qctr{font-size:12px;color:#888}

/* Result */
.result{text-align:center;padding:16px 0}
.result .score{font-size:56px;font-weight:700;color:#e8a020;line-height:1}
.result .rlabel{font-size:13px;color:#888;margin:6px 0 16px}
.result .pass-msg{font-size:18px;font-weight:700;color:#2d6a2d;margin-bottom:6px}
.result .fail-msg{font-size:18px;font-weight:700;color:#c0392b;margin-bottom:6px}
.result-stats{display:flex;justify-content:center;gap:24px;margin:16px 0}
.rs-n{font-size:24px;font-weight:700}
.rs-n.ok{color:#4caf50}.rs-n.bad{color:#f44336}
.rs-l{font-size:11px;color:#888;margin-top:2px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:#e8a020;color:#1a1a1a}.btn-primary:hover{background:#d09010}
.btn-secondary{background:#f4f5f7;color:#555;border:1px solid #e5e7eb}.btn-secondary:hover{background:#e8eaed}
.btn-dark{background:#1a1a1a;color:#fff}.btn-dark:hover{background:#2a2a2a}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* Nav footer */
.mod-nav{display:flex;justify-content:space-between;margin-top:36px;padding-top:20px;border-top:1px solid #e5e7eb}

/* Complete banner */
.complete-banner{background:linear-gradient(135deg,#1a4a1a,#2d6a2d);color:#fff;border-radius:14px;padding:36px;text-align:center;margin-bottom:28px}
.complete-banner .trophy{font-size:44px;margin-bottom:14px}
.complete-banner h2{font-size:22px;font-weight:700;margin-bottom:6px}
.complete-banner p{font-size:14px;color:#90d090;line-height:1.6}

/* Loading / Error */
#loading,#error-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;background:#f4f5f7}
#loading .spinner{width:40px;height:40px;border:4px solid #e5e7eb;border-top-color:#e8a020;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:14px;color:#888}
#error-screen .err-card{background:#fff;border-radius:12px;padding:40px;text-align:center;border:1px solid #e5e7eb;max-width:400px}
#error-screen h2{font-size:18px;font-weight:700;color:#c0392b;margin-bottom:8px}
#error-screen p{font-size:13px;color:#777;line-height:1.6}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════
//  COURSE DATA
//  Each course has modules. Each module has html content + quiz.
// ═══════════════════════════════════════════════════════════════
const COURSES = {

// ─────────────────────────────────────────────
'houston-sales': {
  id: 'houston-sales',
  title: 'Houston Sales Representative Training',
  modules: [
    {
      title: 'Product & Pricing Knowledge',
      sub: 'Containers · Yield · Pricing · ISCC',
      content: `
<div class="mod-header">
  <div class="mod-num-label">Module 1 of 4</div>
  <div class="mod-title">Product & Pricing Knowledge</div>
  <div class="mod-desc">Before you can sell, you need to know your product cold. This module covers what we install, how yield affects payment, how pricing works, and why ISCC certification is a competitive edge.</div>
</div>
<div class="section">
  <h2>Our Sales Philosophy</h2>
  <p>At Fatty Chem, we don't compete on price alone. If a sale is won by a few cents more per pound, it can just as easily be lost by a few cents. What we look for is to understand each customer's needs and find ways to help them run a better operation.</p>
  <div class="callout"><div class="clabel">Your mindset</div><p><strong>You are not a cooking oil salesperson. You are a consultant who helps customers manage their used cooking oil better and operate more efficiently.</strong> When a customer feels you're genuinely trying to help them — not just sell them something — the relationship is stronger and longer-lasting.</p></div>
  <h3 style="margin:20px 0 12px;font-size:15px;color:#1a1a1a">How we create value beyond the price</h3>
  <ul>
    <li>Increasing collection frequency to prevent overflows</li>
    <li>Installing the right container for the volume they generate</li>
    <li>Improving tank placement to make it easier for their staff</li>
    <li>Reducing the risk of spills and accidents</li>
    <li>Helping keep their area cleaner and more organized</li>
    <li>Responding quickly when they have an emergency</li>
    <li>Consistent follow-up to prevent problems before they happen</li>
  </ul>
  <h3 style="margin:20px 0 12px;font-size:15px;color:#1a1a1a">What to ask on visits</h3>
  <p>Instead of only asking <em>"Who collects your oil?"</em> — go deeper:</p>
  <table class="dtable">
    <tr><th>Ask this</th><th>Why it matters</th></tr>
    <tr><td>Have you had issues with overflows?</td><td>Opens the door to frequency or container upgrades</td></tr>
    <tr><td>Is your container the right size for your volume?</td><td>Surfaces a pain they may not have thought to mention</td></tr>
    <tr><td>Is the service frequency working for you?</td><td>Reliability gaps are your biggest opening against nationals</td></tr>
    <tr><td>Is there anything your current provider could do better?</td><td>Gets them talking about frustrations without you leading</td></tr>
    <tr><td>What concerns you most about managing your used oil?</td><td>Reveals the real priority — payment, cleanliness, reliability, compliance</td></tr>
  </table>
  <div class="info-box" style="margin-top:16px"><p>The answers to these questions tell you far more than their volume estimate. A customer who says "we've had a couple of overflows lately" is a customer ready to switch — you just have to listen for it.</p></div>
</div>
<div class="section">
  <h2>Container Types</h2>
  <p>Fatty Chem installs and maintains the collection container at every customer location — at no cost to them. Two main options:</p>
  <h3>Indoor Tanks (Fryer-Connected)</h3>
  <p>Installed inside the kitchen, often connected directly to the fryer drain. Oil goes straight from fryer to tank — minimal water, debris, or contamination. These accounts typically yield <strong>90–95%</strong>. Common in fast food chains and high-volume operations with the right kitchen layout.</p>
  <h3>Outdoor Containers</h3>
  <p>Placed outside, staff pour oil in manually. More exposed to rain, debris, and misuse. Typical yield: <strong>70–75%</strong>. The most common setup, especially for smaller and mid-size restaurants.</p>
  <div class="info-box"><p><strong>Pitch opportunity (high-volume accounts only):</strong> If a high-volume prospect has an outdoor container, an indoor tank upgrade means cleaner oil, higher yield, and a better payment rate for them. This is a compelling story — but only pitch it to accounts that generate a significant, consistent amount of UCO. Indoor tanks are a higher-cost equipment investment and only make sense for customers with strong volume. Do not pitch this to small or medium restaurants.</p></div>
</div>
<div class="section">
  <h2>Understanding Yield</h2>
  <p>Yield is the percentage of collected oil that is usable after processing. The rest — water, food solids, debris — is waste we process and dispose of at our cost. We only pay customers on usable yield.</p>
  <table class="dtable">
    <tr><th>Container Type</th><th>Typical Yield</th><th>Why</th></tr>
    <tr><td><strong>Indoor (fryer-connected)</strong></td><td>90–95%</td><td>Sealed system, minimal contamination</td></tr>
    <tr><td><strong>Outdoor container</strong></td><td>70–75%</td><td>Rain, debris, manual pouring</td></tr>
    <tr><td><strong>Average all accounts</strong></td><td>~75%</td><td>Working assumption for planning</td></tr>
  </table>
  <div class="callout"><div class="clabel">When a customer asks about payment calculation</div><p>"We pay on usable oil only — not gross collected. <strong>Yield is why.</strong> About 25% of what we collect is water and waste we have to process on our end. Your payment reflects only the clean, usable portion."</p></div>
</div>
<div class="section">
  <h2>How Pricing Works</h2>
  <p>UCO is a commodity — price per pound fluctuates with energy and feedstock markets. We pay customers a percentage of the current market price, calculated on their net usable yield.</p>
  <p>In 2025, market price averaged ~$0.44/lb. Customers received $0.10–$0.18/lb. In 2026, prices have risen — customers in our territory are now receiving <strong>more than $0.20/lb</strong>.</p>
  <table class="dtable">
    <tr><th>Account Type</th><th>Typical Rate</th><th>Example Volume</th></tr>
    <tr><td><strong>Standard (most accounts)</strong></td><td>~15% of market</td><td>500–2,000 lbs/month</td></tr>
    <tr><td><strong>Large volume</strong></td><td>Up to 40% of market</td><td>5,000+ lbs/month</td></tr>
  </table>
  <div class="info-box"><p><strong>Payment rates range from 25% to 40% of market rate.</strong> The vast majority of regular accounts are at the standard 25%. The 40% rate is reserved for large, high-volume accounts that justify it based on the volume of oil they generate. Stay within this range — you do not need to confirm with management to quote these rates, just apply the right tier based on the account's volume.</p></div>
</div>
<div class="section">
  <h2>ISCC Certification — Your Competitive Edge</h2>
  <p>ISCC = International Sustainability & Carbon Certification. A global standard for traceable, sustainable biomass supply chains. Fatty Chem is one of the few UCO collectors in Texas with full certification.</p>
  <ul>
    <li>ISCC-certified UCO sells for a <strong>higher price</strong> to buyers — premium flows directly to our margins.</li>
    <li>Large corporate customers increasingly require certified supply chains for sustainability reporting.</li>
    <li>Most Houston competitors are <strong>not ISCC certified</strong> — it's a real differentiator in enterprise conversations.</li>
  </ul>
  <div class="callout"><div class="clabel">How to use it in conversation</div><p>"One thing that sets us apart — we're ISCC certified, one of the few collectors in Texas with that credential. <strong>If your operation has any sustainability reporting requirements, our certification means your oil enters a fully traceable, verified supply chain.</strong> Most of our competitors can't say that."</p></div>
</div>`,
      quiz: [
        { q:"What is the typical yield for an outdoor UCO container?", opts:["90–95%","80–85%","70–75%","60–65%"], ans:2, exp:"Outdoor containers yield 70–75% due to rain, debris, and manual pouring. Indoor fryer-connected tanks achieve 90–95%." },

<div class="obj-card"><div class="obj-head" onclick="this.nextElementSibling.classList.toggle('open')"><h4>"We already have a provider."</h4><span>Most common ↓</span></div>

<div class="script-box"><div class="script-label">Your response</div><p>"That's great — a lot of our best customers came to us the same way. Can I ask how long you've been with them, and are you generally happy with the service? Specifically around pickup reliability and payments?"</p></div>
<p style="font-size:13px;color:#555;margin-top:10px;line-height:1.6">Let them talk. Pain points come out — missed pickups, late payments, no one to call. Then: "That's exactly the kind of thing we've built our reputation on. Would you be open to a quick comparison when your contract is up?" Always get the expiration date and set a 60-day-out follow-up.</p></div></div>

  <p>Fatty Chem By Products is a family-owned business founded in 2003 and headquartered in Los Fresnos, Texas. Our core business is the collection, processing, and resale of used cooking oil (UCO) sourced from industrial kitchens across South and Central Texas.</p>
  <p>Our processed UCO is sold exclusively to the renewable energy sector — specifically biodiesel and renewable diesel producers. Every gallon of oil we collect contributes to a cleaner, more sustainable energy supply chain.</p>
  <p><strong>Current service territory:</strong> Rio Grande Valley (full coverage), McAllen, Brownsville, Laredo, Corpus Christi, Victoria, San Antonio, Austin. Houston is our next major market and is actively being built right now.</p>
</div>
<div class="section">
  <h2>ISCC Certification — What It Is and Why It Matters</h2>
  <p>Fatty Chem is ISCC-certified. ISCC stands for International Sustainability and Carbon Certification — a globally recognized standard that verifies our entire UCO supply chain meets strict sustainability, traceability, and carbon reduction requirements.</p>
  <p>Our buyers — renewable diesel and biodiesel producers — increasingly require ISCC-certified feedstock. Without it, we cannot sell to many of the best buyers in the market.</p>
  <div class="callout"><div class="clabel">ISCC compliance lives in the field</div><p>Accurate volume records, proper documentation, and chain-of-custody integrity all start with the collection team. <strong>The Route &amp; Logistics Leader plays a direct role in protecting our certification every single day.</strong></p></div>
</div>
<div class="section">
  <h2>Role Overview</h2>
  <p>The Route &amp; Logistics Leader is the command center between management, the driver team, and the sales team — ensuring every route is planned correctly, every driver is supported and accountable, and every customer receives the reliable service Fatty Chem is built on.</p>
  <p>This role is <strong>office-based and coordination-focused</strong>. It does not require riding routes daily. What it requires is constant, proactive communication — with drivers before and after every route, with Noe on exchanges, with the sales team as new accounts come on, and with Angela to keep management informed.</p>
  <p><strong>Reports to:</strong> Angela Ayala (angela@fatty-chem.com) &nbsp;|&nbsp; <strong>Direct reports:</strong> UCO Drivers &amp; Noe (Exchanges &amp; Deliveries)</p>
</div>
<div class="section">
  <h2>Core Responsibilities</h2>
  <table class="dtable">
    <tr><th>Area</th><th>What You Own</th></tr>
    <tr><td><strong>Route Planning</strong></td><td>Build and maintain daily/weekly collection schedules. Optimize for stop density, mileage, and time efficiency.</td></tr>
    <tr><td><strong>Driver Supervision</strong></td><td>Directly manage all UCO drivers. Assign routes, monitor performance, enforce standards, conduct check-ins before and after every route.</td></tr>
    <tr><td><strong>Route Analysis</strong></td><td>Review volumes per stop, collection frequency, stop profitability. Report findings and recommendations to Angela.</td></tr>
    <tr><td><strong>Noe / Exchanges</strong></td><td>Coordinate Noe's container exchange schedule. Ensure new containers are installed on time and old ones retrieved.</td></tr>
    <tr><td><strong>Sales Coordination</strong></td><td>Receive new account handoffs from the sales team. Coordinate installs with Noe. Confirm new stops are running correctly.</td></tr>
    <tr><td><strong>ISCC &amp; Compliance</strong></td><td>Ensure drivers follow all documentation and chain-of-custody procedures. Enforce safety and DOT procedures. Report compliance concerns immediately.</td></tr>
    <tr><td><strong>Reporting to Angela</strong></td><td>Provide daily operational updates — route completion, volumes, incidents. Proactively flag anything requiring management attention.</td></tr>
  </table>
</div>
<div class="section">
  <h2>What Success Looks Like</h2>
  <ul>
    <li>Routes are planned efficiently — maximizing volume per stop and minimizing wasted miles</li>
    <li>Drivers show up every day knowing exactly what is expected of them</li>
    <li>All scheduled stops are completed — no missed pickups, no surprises</li>
    <li>New accounts from the sales team are onboarded smoothly onto routes</li>
    <li>Angela receives daily updates without having to ask for them</li>
    <li>Problems are reported and resolved quickly — no issues sit unaddressed</li>
  </ul>
</div>`,

<div class="mod-header">
  <div class="mod-num-label">Module 2 of 4</div>
  <div class="mod-title">Daily Tasks & Bioledger</div>
  <div class="mod-desc">Four core daily tasks must be completed every operational day without exception. These are the operational heartbeat of the position — and Bioledger is at the center of most of them.</div>
</div>
<div class="section">
  <h2>Task 1 — Input Net Lbs into the Route Analysis Spreadsheet</h2>
  <p>At the start of each day, enter the previous day's net pounds collected for each route into the Route Analysis spreadsheet. This spreadsheet is the primary tool for tracking performance over time — it feeds management reporting and is used to evaluate routes against targets.</p>
  <p><strong>How to calculate net lbs:</strong> Take the difference between the Light Weight Ticket and the Heavy Weight Ticket. If a driver covered multiple routes or split stops, log them separately. Accuracy is critical — missing or incorrect entries create blind spots in our data.</p>
</div>
<div class="section">
  <h2>Task 2 — Close Daily Tickets in Bioledger</h2>
  <p>Every collection from the previous day must be closed as a ticket in Bioledger before end of the current business day. This is required for ISCC compliance. There are two collection types — it is essential to differentiate between them correctly:</p>
  <table class="dtable">
    <tr><th>Type</th><th>What It Means</th></tr>
    <tr><td><strong>EU Collection</strong></td><td>Recorded under EU RED compliance. Used for feedstock going to buyers that require EU sustainability standards.</td></tr>
    <tr><td><strong>EPA Collection</strong></td><td>Recorded under U.S. EPA standards. Used for feedstock going to domestic buyers under RFS requirements.</td></tr>
  </table>
  <p style="margin-top:12px"><strong>Before closing any ticket, verify all four of these fields:</strong></p>
  <table class="dtable">
    <tr><th>#</th><th>Field</th><th>Required Value</th></tr>
    <tr><td>1</td><td>Raw Material</td><td>Must be set to: Used Cooking Oil</td></tr>
    <tr><td>2</td><td>EU RED Compliance</td><td>Must be set to: Yes</td></tr>
    <tr><td>3</td><td>Total Default Value</td><td>Must be set to: No</td></tr>
    <tr><td>4</td><td>Signature on File</td><td>A valid restaurant signature must be present on the account image</td></tr>
  </table>
  <div class="callout"><div class="clabel">Critical — Signature Requirement</div><p>Before closing any ticket, verify there is a valid signature from a representative of the restaurant or business (owner, manager, or designated staff). <strong>A signature from the driver is NEVER acceptable.</strong> A driver-signed ticket does not meet ISCC chain-of-custody requirements and must be closed as EPA — not EU. Notify the driver immediately that customer signatures are required every time.</p></div>
</div>
<div class="section">
  <h2>Task 3 — Work Orders: Create, Assign & Follow Up</h2>
  <p>All work orders are managed through the Fatty Chem WO System at <strong>fatty-chem-wo.netlify.app</strong>. The Driver App (installed on phones) is at <strong>fatty-chem-wo.netlify.app/driver.html</strong>.</p>
  <table class="dtable">
    <tr><th>Role</th><th>Access & Responsibility</th></tr>
    <tr><td><strong>Salesperson</strong></td><td>Creates WOs, submits as PENDING. Can track status of own WOs.</td></tr>
    <tr><td><strong>Dispatcher</strong></td><td>Reviews all PENDING WOs. Assigns drivers and dates. Can also create WOs directly as SCHEDULED. Monitors all active orders.</td></tr>
    <tr><td><strong>Driver</strong></td><td>Sees only WOs assigned to them. Updates status in the field: Scheduled → In Progress → Completed. Adds notes, photos, customer signature.</td></tr>
  </table>
  <div class="info-box"><p><strong>Work Order Discipline:</strong> An open work order is an open commitment. Review and update open work orders every day — not at the end of the week.</p></div>
</div>
<div class="section">
  <h2>Task 4 — Driver Check-In & Route Monitoring</h2>
  <p>Throughout the day, actively monitor that every driver is on their route. This is not passive — it requires intentional, consistent communication with each driver every single day.</p>
  <ul>
    <li>At the start of the day, verify in Bioledger that each driver has begun their assigned route. If a driver hasn't started within their expected window, contact them immediately.</li>
    <li>Maintain active communication throughout the day — check in to make sure things are running smoothly. Ask if they need anything: supplies, support, route adjustments, or help with a customer issue.</li>
    <li>If a driver is falling behind or skipping stops, address it in real time — not at end of day.</li>
    <li>At end of day, confirm all assignments are accounted for and nothing is left open without a plan.</li>
  </ul>
  <div class="callout"><div class="clabel">The standard</div><p><strong>Every driver should hear from the dispatcher at least once during their route.</strong> Not because there is a problem — but because that consistent communication is what keeps problems from happening in the first place.</p></div>
</div>
<div class="section">
  <h2>Bioledger — Start of Day Process</h2>
  <div class="steps">
    <div class="step"><div class="step-n">1</div><div class="step-b"><h4>Verify Route Assignments</h4><p>Check that each driver's route is correctly assigned in Bioledger. If a driver asks to add an account, always ask WHY first — it may be a missed stop from the prior day, not a legitimately new addition.</p></div></div>
    <div class="step"><div class="step-n">2</div><div class="step-b"><h4>Review Reported Problems (Previous Day)</h4><p>Identify any problems logged by drivers (blocked access, full container, customer closed, etc.). Record all issues in the Excel log with account name, problem type, driver, and date. Generate Work Orders for follow-up.</p></div></div>
    <div class="step"><div class="step-n">3</div><div class="step-b"><h4>Approve Tickets from the Previous Day</h4><p>Once routes and problems are reviewed, approve the previous day's tickets in Bioledger. This validates the data and ensures loads are correctly registered for traceability.</p></div></div>
  </div>
  <div class="info-box"><p><strong>Bioledger Support:</strong> If you experience any system issue, email support@bioledger.io (TO), stephanie@bioledger.io and michalina@bioledger.io (CC), and angela@fatty-chem.com (CC). Contact in the morning — Bioledger's team is based in Europe. Always include: account name, date, route name, and a description of the issue.</p></div>
</div>`,

    <tr><td><strong>UCO</strong></td><td>Used Cooking Oil — the commodity we collect from commercial kitchens and process for resale to renewable energy producers.</td></tr>
    <tr><td><strong>Yield</strong></td><td>The percentage of collected UCO that is usable after processing — typically 75 to 95%. Affected by water content, oil quality, and container type.</td></tr>
    <tr><td><strong>Bioledger</strong></td><td>Our digital traceability platform. Records every UCO collection — customer, date, driver, volume. Required for ISCC compliance and chain-of-custody documentation.</td></tr>
    <tr><td><strong>ISCC</strong></td><td>International Sustainability and Carbon Certification. Verifies the Fatty Chem UCO supply chain meets global sustainability and traceability standards — required by most premium renewable fuel buyers.</td></tr>
    <tr><td><strong>Chain of Custody</strong></td><td>The documented trail tracking UCO from collection at a kitchen all the way to delivery to the fuel producer. Required by ISCC and verified through Bioledger.</td></tr>
    <tr><td><strong>RIN</strong></td><td>Renewable Identification Number. A U.S. regulatory credit tied to renewable fuel production. Higher RIN values mean higher UCO prices.</td></tr>
    <tr><td><strong>Exchange / Swap</strong></td><td>The replacement of a customer's container with a different size or type, coordinated by Noe when volumes or needs change.</td></tr>
    <tr><td><strong>RGV</strong></td><td>Rio Grande Valley — the deep South Texas region along the U.S.-Mexico border where our operations are headquartered.</td></tr>
  </table>
</div>`,
      quiz: [
        { q:"Which performance metric must be achieved at 100% — every single day?", opts:["Route Efficiency (lbs/stop and lbs/mile improvement)","Container Exchange Timeliness","Route Completion Rate — all scheduled stops completed","On-Time Service Rate"], ans:2, exp:"Route Completion Rate is tracked daily and the target is 100% — all scheduled stops completed. This is the most fundamental daily performance measure. All other metrics can be trended weekly or monthly, but no stops can be left uncompleted without accountability." },
        { q:"Which of the following events must be reported to Angela IMMEDIATELY — not at end of day?", opts:["A driver who arrived 15 minutes late to their route start","A minor customer question about payment timing","A vehicle accident, UCO spill on customer property, or any ISCC compliance concern","A driver requesting the following day off"], ans:2, exp:"Vehicle accidents, UCO spills on customer property or public roads, driver injuries, significant customer confrontations, theft, and ISCC compliance concerns must all be reported to Angela immediately — not at end of day." },
        { q:"What does 'Chain of Custody' mean in Fatty Chem's operations?", opts:["The driver sign-off protocol for end-of-day vehicle inspection","The documented trail tracking UCO from collection at a kitchen all the way to delivery to the fuel producer — required by ISCC and verified through Bioledger","The payment chain from Fatty Chem to the customer","The management approval chain for route changes"], ans:1, exp:"Chain of Custody is the documented trail tracking UCO from collection at a customer's kitchen all the way to delivery to the renewable fuel producer. It is required by ISCC and verified through Bioledger. Every link in the chain must be recorded and accurate." },
        { q:"What does a RIN (Renewable Identification Number) represent?", opts:["The Fatty Chem driver's route identification code in Bioledger","The customer's container size classification","A U.S. regulatory credit tied to renewable fuel production — higher RIN values mean higher UCO prices","The ISCC audit number assigned during annual certification"], ans:2, exp:"A RIN (Renewable Identification Number) is a U.S. regulatory credit tied to renewable fuel production under the Renewable Fuel Standard (RFS). Higher RIN values increase the market price of UCO — which is why EU-certified collections are more valuable than EPA-only collections." },
        { q:"Who is responsible for coordinating all preventive maintenance schedules for trucks and equipment?", opts:["The Route & Logistics Leader handles all maintenance directly","Maintenance is coordinated with Anabelle in administration","Each driver is responsible for scheduling their own vehicle's maintenance","Angela approves all maintenance work orders before scheduling"], ans:1, exp:"Vehicle and equipment maintenance is coordinated with Anabelle (the main office admin). The Route & Logistics Leader must report mechanical issues, damages, or parts needed immediately so Anabelle can address and resolve them efficiently." }
      ]
    }
  ]
}

}; // end COURSES

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let enrollment = null;
let courseData  = null;
let progress    = {}; // moduleIndex -> {completed, quizScore}
let quizState   = {}; // moduleIndex -> {currentQ, answers, submitted, score, passed}
let currentMod  = 0;
let scriptUrl   = localStorage.getItem('fc_lms_script_url') || '';

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
async function init() {
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');
  const apiParam = params.get('api');
  if (apiParam) { scriptUrl = apiParam; localStorage.setItem('fc_lms_script_url', scriptUrl); }

  if (!token) { showError('No Training Link Found', 'This page requires a valid training link. Please contact your manager to receive your training invitation.'); return; }
  if (!scriptUrl) { showError('System Not Configured', 'The LMS backend has not been configured yet. Please contact your manager.'); return; }

  try {
    const res = await fetch(`${scriptUrl}?action=getEnrollment&token=${token}`);
    const data = await res.json();
    if (!data.success || !data.enrollment) { showError('Link Not Found', 'This training link is invalid or has expired. Contact your manager for a new link.'); return; }
    enrollment = data.enrollment;
    courseData  = COURSES[enrollment.courseId];
    if (!courseData) { showError('Course Not Found', `Course "${enrollment.courseId}" is not available. Please contact your manager.`); return; }

    // Load progress
    const progRes  = await fetch(`${scriptUrl}?action=getProgress&token=${token}`);
    const progData = await progRes.json();
    if (progData.success && progData.progress) {
      progData.progress.forEach(p => {
        progress[Number(p.moduleIndex)] = { completed: String(p.completed) === 'true', quizScore: Number(p.quizScore) || 0 };
      });
    }

    // Init quiz state per module
    courseData.modules.forEach((_, i) => {
      quizState[i] = { currentQ: 0, answers: {}, submitted: false, score: 0, passed: false };
      if (progress[i] && progress[i].completed) {
        quizState[i].passed = true;
        quizState[i].score  = courseData.modules[i].quiz.length;
      }
    });

    // Render
    document.getElementById('loading').style.display    = 'none';
    document.getElementById('app').style.display        = 'flex';
    document.getElementById('sb-name').textContent      = enrollment.employeeName;
    document.getElementById('sb-course').textContent    = enrollment.courseName;
    document.title = `${courseData.title} — Fatty Chem`;

    buildSidebar();
    showModule(0);

  } catch(err) {
    showError('Connection Error', 'Could not connect to the training system. Please check your internet connection and try again, or contact your manager.');
  }
}

function showError(title, msg) {
  document.getElementById('loading').style.display      = 'none';
  document.getElementById('error-screen').style.display = 'flex';
  document.getElementById('err-title').textContent      = title;
  document.getElementById('err-msg').textContent        = msg;
}

// ═══════════════════════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════════════════════
function buildSidebar() {
  const wrap = document.getElementById('sb-modules');
  wrap.innerHTML = courseData.modules.map((m, i) => `
    <div class="sb-mod ${progress[i]?.completed ? 'done' : ''} ${i === currentMod ? 'active' : ''}" id="sb-mod-${i}" onclick="showModule(${i})">
      <div class="mod-num" id="sb-num-${i}">${progress[i]?.completed ? '✓' : i + 1}</div>
      <div class="mod-info">
        <div class="mod-name">${esc(m.title)}</div>
        <div class="mod-sub">${esc(m.sub || '')}</div>
      </div>
    </div>
  `).join('');
  updateProgress();
}

function updateProgress() {
  const total    = courseData.modules.length;
  const done     = courseData.modules.filter((_, i) => progress[i]?.completed).length;
  const pct      = Math.round(done / total * 100);
  document.getElementById('sb-prog-fill').style.width = pct + '%';
  document.getElementById('sb-pct').textContent       = pct + '%';

  const statusMap = { not_started: 'Not Started', in_progress: 'In Progress', completed: 'Completed' };
  const badge     = document.getElementById('tb-status-badge');
  const label     = done === total ? 'Completed' : done > 0 ? 'In Progress' : 'Not Started';
  badge.textContent  = label;
  badge.style.background = done === total ? '#e8f4e8' : done > 0 ? '#fff4dc' : '#f4f5f7';
  badge.style.color      = done === total ? '#2d6a2d' : done > 0 ? '#b87b00' : '#888';
  badge.style.borderColor= done === total ? '#90c890' : done > 0 ? '#f0d080' : '#e5e7eb';

  // Update sidebar items
  courseData.modules.forEach((_, i) => {
    const modEl  = document.getElementById('sb-mod-' + i);
    const numEl  = document.getElementById('sb-num-' + i);
    if (!modEl) return;
    modEl.classList.toggle('done',   !!progress[i]?.completed);
    modEl.classList.toggle('active', i === currentMod);
    numEl.textContent = progress[i]?.completed ? '✓' : i + 1;
  });
}

// ═══════════════════════════════════════════════════════════════
//  MODULE RENDERING
// ═══════════════════════════════════════════════════════════════
function showModule(idx) {
  currentMod = idx;
  const mod  = courseData.modules[idx];
  const qs   = quizState[idx];
  const isLast = idx === courseData.modules.length - 1;
  const allDone = courseData.modules.every((_, i) => progress[i]?.completed);

  document.getElementById('tb-crumb').innerHTML = `${esc(courseData.title)} <strong>/ Module ${idx + 1}: ${esc(mod.title)}</strong>`;

  let completionHtml = '';
  if (allDone) {
    completionHtml = `<div class="complete-banner"><div class="trophy">🏆</div><h2>Course Complete — Well Done!</h2><p>You've completed all ${courseData.modules.length} modules. You're ready. Go make it happen.</p></div>`;
  }

  document.getElementById('module-content').innerHTML = `
    ${completionHtml}
    ${mod.content}
    <div id="quiz-wrap">
      <div class="quiz-head"><h2>Module ${idx + 1} Quiz</h2><p>5 questions · Need 4/5 to pass · Your progress is saved automatically</p></div>
      <div id="quiz-body"></div>
    </div>
    <div class="mod-nav">
      ${idx > 0 ? `<button class="btn btn-secondary" onclick="showModule(${idx - 1})">← Prev Module</button>` : '<span></span>'}
      ${!isLast ? `<button class="btn btn-primary" onclick="showModule(${idx + 1})">Next Module →</button>` : `<button class="btn btn-dark" onclick="showModule(0)">↩ Back to Module 1</button>`}
    </div>
  `;

  renderQuiz(idx);
  updateProgress();
  window.scrollTo(0, 0);
}

// ═══════════════════════════════════════════════════════════════
//  QUIZ
// ═══════════════════════════════════════════════════════════════
function renderQuiz(modIdx) {
  const body = document.getElementById('quiz-body');
  if (!body) return;
  const mod  = courseData.modules[modIdx];
  const qs   = quizState[modIdx];
  const quiz = mod.quiz;

  // If already passed and progress saved, show complete state
  if (qs.passed && progress[modIdx]?.completed) {
    body.innerHTML = `<div class="result" style="margin-top:0">
      <div style="font-size:40px;margin-bottom:8px">✅</div>
      <div class="pass-msg">Module ${modIdx + 1} Complete!</div>
      <div style="font-size:13px;color:#888;margin-bottom:16px">Score: ${progress[modIdx].quizScore}/${quiz.length} · ${Math.round(progress[modIdx].quizScore/quiz.length*100)}%</div>
      <button class="btn btn-secondary" onclick="retakeQuiz(${modIdx})" style="font-size:12px">Retake for practice</button>
    </div>`;
    return;
  }

  if (qs.submitted) {
    renderQuizResult(modIdx);
    return;
  }

  const q       = quiz[qs.currentQ];
  const letters = ['A','B','C','D'];
  const answered = qs.answers[qs.currentQ] !== undefined;
  const isLast   = qs.currentQ === quiz.length - 1;

  const dots = quiz.map((_, i) => {
    let cls = 'q-dot';
    if (qs.answers[i] !== undefined) cls += ' ans';
    return `<div class="${cls}"></div>`;
  }).join('');

  const opts = q.opts.map((opt, i) => {
    let cls = 'opt';
    if (answered) {
      if (i === qs.answers[qs.currentQ] && i === q.ans) cls += ' ok';
      else if (i === qs.answers[qs.currentQ]) cls += ' bad';
      else if (i === q.ans) cls += ' show-ok';
    }
    return `<div class="${cls}" onclick="selectAnswer(${modIdx},${i})">
      <div class="opt-ltr">${letters[i]}</div>${esc(opt)}
    </div>`;
  }).join('');

  let explainHtml = '';
  if (answered) {
    const correct = qs.answers[qs.currentQ] === q.ans;
    explainHtml = `<div class="explain ${correct ? 'ok-exp' : 'bad-exp'}">${correct ? '✓ Correct! ' : '✗ Not quite. '}${esc(q.exp)}</div>`;
  }

  body.innerHTML = `
    <div class="q-dots">${dots}</div>
    <div class="q-num">Question ${qs.currentQ + 1} of ${quiz.length}</div>
    <div class="q-text">${esc(q.q)}</div>
    <div class="opts">${opts}</div>
    ${explainHtml}
    <div class="quiz-nav">
      <span class="qctr">${Object.keys(qs.answers).length}/${quiz.length} answered</span>
      <div style="display:flex;gap:8px">
        ${qs.currentQ > 0 ? `<button class="btn btn-secondary" onclick="quizNav(${modIdx},-1)">← Prev</button>` : ''}
        ${answered && !isLast ? `<button class="btn btn-primary" onclick="quizNav(${modIdx},1)">Next →</button>` : ''}
        ${answered && isLast ? `<button class="btn btn-primary" onclick="submitQuiz(${modIdx})">Submit Quiz</button>` : ''}
      </div>
    </div>
  `;
}

function renderQuizResult(modIdx) {
  const body = document.getElementById('quiz-body');
  const mod  = courseData.modules[modIdx];
  const qs   = quizState[modIdx];
  const total = mod.quiz.length;
  const wrong = total - qs.score;

  if (qs.passed) {
    body.innerHTML = `<div class="result">
      <div style="font-size:40px;margin-bottom:8px">🎉</div>
      <div class="pass-msg">Module ${modIdx + 1} Complete!</div>
      <div class="result-stats">
        <div><div class="rs-n ok">${qs.score}</div><div class="rs-l">Correct</div></div>
        <div><div class="rs-n bad">${wrong}</div><div class="rs-l">Incorrect</div></div>
        <div><div class="rs-n" style="color:#e8a020">${Math.round(qs.score/total*100)}%</div><div class="rs-l">Score</div></div>
      </div>
      ${modIdx < courseData.modules.length - 1 ? `<button class="btn btn-primary" onclick="showModule(${modIdx + 1})" style="margin-top:8px">Continue to Module ${modIdx + 2} →</button>` : '<div style="color:#2d6a2d;font-weight:700;margin-top:12px;font-size:15px">🏆 All modules complete!</div>'}
    </div>`;
  } else {
    body.innerHTML = `<div class="result">
      <div class="fail-msg">Not quite — ${qs.score}/${total}. Need ${Math.ceil(total * 0.8)} to pass.</div>
      <div style="font-size:13px;color:#666;margin:8px 0 16px;line-height:1.6">Review the module content above and try again. All the answers are in the reading.</div>
      <button class="btn btn-dark" onclick="retakeQuiz(${modIdx})">Retake Quiz</button>
    </div>`;
  }
}

function selectAnswer(modIdx, optIdx) {
  const qs = quizState[modIdx];
  if (qs.submitted) return;
  if (qs.answers[qs.currentQ] !== undefined) return;
  qs.answers[qs.currentQ] = optIdx;
  renderQuiz(modIdx);
}

function quizNav(modIdx, dir) {
  quizState[modIdx].currentQ = Math.max(0, Math.min(courseData.modules[modIdx].quiz.length - 1, quizState[modIdx].currentQ + dir));
  renderQuiz(modIdx);
}

async function submitQuiz(modIdx) {
  const qs   = quizState[modIdx];
  const quiz = courseData.modules[modIdx].quiz;
  qs.submitted = true;
  qs.score     = quiz.reduce((acc, q, i) => acc + (qs.answers[i] === q.ans ? 1 : 0), 0);
  qs.passed    = qs.score >= Math.ceil(quiz.length * 0.8);

  if (qs.passed) {
    progress[modIdx] = { completed: true, quizScore: qs.score };
    // Save to backend
    try {
      await fetch(scriptUrl, {
        method: 'POST',
        body: JSON.stringify({
          action: 'saveProgress',
          token: enrollment.token,
          moduleIndex: modIdx,
          moduleTitle: courseData.modules[modIdx].title,
          completed: true,
          quizScore: qs.score
        })
      });
      // Check if all modules done
      const allDone = courseData.modules.every((_, i) => progress[i]?.completed);
      if (allDone) {
        const totalScore = Math.round(courseData.modules.reduce((acc, m, i) => acc + (progress[i]?.quizScore || 0), 0) / courseData.modules.length / 5 * 100);
        await fetch(scriptUrl, {
          method: 'POST',
          body: JSON.stringify({ action: 'completeCourse', token: enrollment.token, finalScore: totalScore })
        });
      }
    } catch(e) { /* silently fail — progress already in memory */ }
    updateProgress();
  }
  renderQuizResult(modIdx);
}

function retakeQuiz(modIdx) {
  quizState[modIdx] = { currentQ: 0, answers: {}, submitted: false, score: 0, passed: false };
  renderQuiz(modIdx);
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Start ───────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', init);
</script>

</html>
